name: SGBus
options:
  bundleIdPrefix: com.sgbus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
targets:
  SGBus:
    type: application
    platform: iOS
    sources:
      - path: Models
      - path: Services
      - path: Theme
      - path: ViewModels
      - path: Views
      - path: SGBusApp.swift
      - path: LiveActivity
      - path: Assets.xcassets
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "SG Bus"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
    dependencies:
      - target: SGBusWidgets
  SGBusWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: ../SGBusWidgets
      - path: LiveActivity/BusLiveActivityAttributes.swift
    settings:
      base:
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: ../SGBusWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sgbus.SGBus.SGBusWidgets

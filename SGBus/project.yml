name: SGBus
options:
  bundleIdPrefix: com.sgbus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
targets:
  SGBus:
    type: application
    platform: iOS
    sources:
      - path: Models
      - path: Services
      - path: Theme
      - path: ViewModels
      - path: Views
      - path: SGBusApp.swift
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "SG Bus"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
